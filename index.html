<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>毕业典礼视频入口</title>
    <style>
        /* 全局重置，纯白背景 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        /* 状态显示区 – 纯静态 */
        .status {
            font-size: 2rem;
            font-weight: 500;
            padding: 12px 30px;
            border: 2px dashed #d0d0d0;
            border-radius: 12px;
            display: inline-block;
            background-color: #fafafa;
            color: #1a1a1a;
            margin-bottom: 30px;
        }
        /* 大按钮 */
        .btn {
            display: inline-block;
            margin: 10px 0 30px;
            padding: 18px 56px;
            font-size: 1.6rem;
            font-weight: 600;
            color: #ffffff;
            background-color: #007aff;
            border: none;
            border-radius: 60px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.25s, transform 0.1s;
            box-shadow: 0 6px 18px rgba(0, 122, 255, 0.35);
        }
        .btn:hover {
            background-color: #005bbf;
        }
        .btn:active {
            transform: scale(0.95);
        }
        /* 提醒区域 */
        .reminder {
            font-size: 1.05rem;
            color: #444;
            line-height: 1.8;
            border-top: 1px solid #eaeaea;
            padding-top: 28px;
            width: 100%;
        }
        .reminder strong {
            color: #1a1a1a;
        }
        .reminder .highlight {
            background: #fff3cd;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 服务器状态：直接写死在 HTML 中 -->
    <div class="status">🟢服务器正常运行</div>

    <!-- 进入按钮：跳转到视频子域名，文字已修改 -->
    <a href="https://video.aprs.dpdns.org" class="btn" target="_blank">🎬 进入视频文件页</a>

    <!-- 重要提醒（内容不变） -->
    <div class="reminder">
        <strong>📢 重要提醒</strong><br />
        服务器开放时间：<span class="highlight">2026年7月17日 — 7月20日</span><br />
        （后期可能延长，请大家尽快下载）
    </div>
</div>

</body>
</html>
