<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>毕业典礼视频入口</title>
    <style>
        /* 全局重置，纯白背景 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        /* 状态显示区 – 点击即可编辑 */
        .status {
            font-size: 2rem;
            font-weight: 500;
            padding: 12px 30px;
            border: 2px dashed #d0d0d0;
            border-radius: 12px;
            display: inline-block;
            cursor: text;
            transition: border-color 0.3s, background 0.2s;
            background-color: #fafafa;
            min-width: 160px;
            color: #1a1a1a;
        }
        .status:hover {
            border-color: #999;
        }
        .status:focus {
            outline: none;
            border-color: #007aff;
            background-color: #f0f7ff;
        }
        .edit-hint {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 6px;
            margin-bottom: 30px;
        }
        /* 大按钮 */
        .btn {
            display: inline-block;
            margin: 10px 0 30px;
            padding: 18px 56px;
            font-size: 1.6rem;
            font-weight: 600;
            color: #ffffff;
            background-color: #007aff;
            border: none;
            border-radius: 60px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.25s, transform 0.1s;
            box-shadow: 0 6px 18px rgba(0, 122, 255, 0.35);
        }
        .btn:hover {
            background-color: #005bbf;
        }
        .btn:active {
            transform: scale(0.95);
        }
        /* 提醒区域 */
        .reminder {
            font-size: 1.05rem;
            color: #444;
            line-height: 1.8;
            border-top: 1px solid #eaeaea;
            padding-top: 28px;
            width: 100%;
        }
        .reminder strong {
            color: #1a1a1a;
        }
        .reminder .highlight {
            background: #fff3cd;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 服务器状态：点击文字可直接编辑修改 -->
    <div class="status" contenteditable="true" id="statusText">🟢 服务器运行中</div>
    <div class="edit-hint">👆 点击状态文字可手动更改</div>

    <!-- 进入按钮：跳转到视频子域名 -->
    <a href="https://video.aprs.dpdns.org" class="btn" target="_blank">🎬 进入视频中心</a>

    <!-- 重要提醒 -->
    <div class="reminder">
        <strong>📢 重要提醒</strong><br />
        服务器开放时间：<span class="highlight">2026年7月17日 — 7月20日</span><br />
        （后期可能延长，请大家尽快下载）
    </div>
</div>

<script>
    (function() {
        const statusEl = document.getElementById('statusText');

        // 当用户修改状态后，自动保存到 localStorage，刷新页面后恢复
        statusEl.addEventListener('blur', function() {
            const val = this.innerText.trim();
            if (val) {
                localStorage.setItem('serverStatus', val);
            }
        });

        // 页面加载时恢复之前保存的状态
        const saved = localStorage.getItem('serverStatus');
        if (saved) {
            statusEl.innerText = saved;
        }

        // 按回车键时自动失焦（避免换行）
        statusEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                this.blur();
            }
        });
    })();
</script>

</body>
</html>
