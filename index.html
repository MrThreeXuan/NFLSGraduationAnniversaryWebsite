<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>支持周期已结束 - 毕业典礼视频</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        .status {
            font-size: 2rem;
            font-weight: 500;
            padding: 12px 30px;
            border: 2px dashed #d0d0d0;
            border-radius: 12px;
            display: inline-block;
            background-color: #fafafa;
            color: #1a1a1a;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            margin: 10px 0 30px;
            padding: 18px 56px;
            font-size: 1.6rem;
            font-weight: 600;
            color: #b0b0b0;
            background-color: #e8e8e8;
            border: none;
            border-radius: 60px;
            text-decoration: none;
            cursor: not-allowed;
            box-shadow: none;
            pointer-events: none;
        }
        .reminder {
            font-size: 1.05rem;
            color: #444;
            line-height: 1.8;
            border-top: 1px solid #eaeaea;
            padding-top: 28px;
            width: 100%;
        }
        .reminder strong {
            color: #1a1a1a;
        }
        .reminder .highlight {
            background: #fff3cd;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="status">⏰ 支持周期已结束</div>

    <div class="btn">🎬 进入视频文件页</div>

    <div class="reminder">
        <strong>🙏 感谢大家的访问与支持</strong><br />
        本次毕业典礼视频分发已圆满结束。<br />
        如有后续问题，请联系班级负责人。
    </div>
</div>

</body>
</html>
